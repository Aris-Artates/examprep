# minimal nginx.conf for RTMP + HLS (Windows native)
worker_processes  1;

error_log  logs/error.log warn;
events {
    worker_connections  1024;
}

rtmp {
    server {
        listen 1935;
        chunk_size 4096;

        application live {
            live on;
            record off;

            # create HLS fragments
            hls on;
            hls_path hls;
            hls_fragment 3;
            # optional: hls_playlist_length 60;
        }
    }
}

http {
    server {
        listen 8080;
        location / {
            root .;
        }
        location /live {
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
            root .;
        }
    }
}
